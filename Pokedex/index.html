<!DOCTYPE html>
<html>
<head>
  <title>CrusadersDEX</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>CrusadersDEX</h1>

  <div class="controls">
    <input type="text" id="search" placeholder="Cerca creaturina..." />

    <select id="typeFilter">
      <option value="">Tutti i tipi</option>
    </select>

    <select id="sort">
      <option value="id">Numero</option>
      <option value="name">Nome A-Z</option>
    </select>
  </div>

  <p id="startMessage">Cerca un Pokémon o seleziona un filtro 👇</p>
  <p id="noResults" style="display:none;">Nessuno stronzetto trovato</p>

  <div id="pokedex"></div>

  <script src="pokemon.js"></script>
  <script src="script.js"></script>
</body>
</html>

  <script src="pokemon.js"></script>
  <script src="script.js"></script>
</body>
</html>
